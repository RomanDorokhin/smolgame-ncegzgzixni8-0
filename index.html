<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>METAMORPHOSIS</title>
<link rel="stylesheet" href="css/game.css">
</head>
<body>

<div id="ui">
  <span id="gameLabel">—</span>
  <div id="scoreBlock">
    <span id="score">0</span>
    <div id="bestLine" aria-live="polite"></div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<div id="pauseHint">пауза · esc</div>

<div id="controls">
  <div class="ctrl-stack">
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btnUp">▲</div>
    </div>
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btnLeft">◀</div>
      <div class="ctrl-btn" id="btnDown">▼</div>
      <div class="ctrl-btn" id="btnRight">▶</div>
    </div>
  </div>
</div>

<div id="overlay">
  <h1>Metamorphosis</h1>
  <p>Одно существо · пять форм · прогрессия переносится между ними<br>
  собирай кристаллы → расти змейку · ешь еду → расширяй платформу<br>
  смерть — это не конец, а перерождение в следующую форму</p>
  <button type="button" id="startBtn">[ начать ]</button>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
